services:
  mongo:
    image: mongo:7
    container_name: cms-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/committee_management_system
    ports:
      - '5001:5000'
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      API_BASE_URL: /api
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  mongo_data:
