<div class="stat-card">
  <div class="stat-card__header">
    <span class="stat-card__title">{{ title() }}</span>
    <mat-icon>{{ icon() }}</mat-icon>
  </div>

  <p class="stat-card__value">{{ value() | number }}</p>

  @if (trend() !== null) {
    <p class="stat-card__trend" [ngClass]="{ 'is-positive': (trend() ?? 0) >= 0, 'is-negative': (trend() ?? 0) < 0 }">
      {{ trend() }}% {{ trendLabel() }}
    </p>
  }
</div>
