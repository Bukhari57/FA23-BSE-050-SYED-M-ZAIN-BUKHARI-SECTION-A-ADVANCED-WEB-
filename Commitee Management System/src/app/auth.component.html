<div class="auth-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isLogin ? 'Login' : 'Sign Up' }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="authForm" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" required>
          <mat-error *ngIf="authForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="authForm.get('email')?.hasError('email')">Invalid email format</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" required>
          <mat-error *ngIf="authForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="authForm.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
        </mat-form-field>
        <button mat-flat-button color="primary" type="submit" [disabled]="authForm.invalid || loading">
          {{ loading ? (isLogin ? 'Logging in...' : 'Signing up...') : (isLogin ? 'Login' : 'Sign Up') }}
        </button>
      </form>
      <button mat-button (click)="toggleMode()" style="margin-top: 1rem; width: 100%; text-align: center;">
        {{ isLogin ? 'Need an account? Sign Up' : 'Already have an account? Login' }}
      </button>
      <div *ngIf="errorMsg" class="error-message">
        <mat-icon class="error-icon">error</mat-icon>
        <div class="error-text">{{ errorMsg }}</div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
